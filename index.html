<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Chess Custom Engine with Clocks</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        /* Modern UI Layout Styles */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #302e2b; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        h1 { margin-top: 10px; margin-bottom: 5px; font-size: 2rem; letter-spacing: 0.5px; }
        
        /* Chess Clocks Styling */
        .clocks-container { 
            display: flex; 
            justify-content: space-between; 
            width: 340px; 
            margin: 10px 0; 
            font-family: monospace; 
            font-size: 1.6rem; 
            font-weight: bold; 
        }
        .clock { 
            background: #1a1917; 
            padding: 8px 15px; 
            border-radius: 6px; 
            border: 2px solid #403e3b; 
            width: 100px; 
            text-align: center; 
            color: #fff;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .active-clock { border-color: #81b64c; color: #81b64c; background: #222521; }

        #board { 
            width: 400px; 
            max-width: 90vw; 
            margin: 15px 0; 
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        
        .menu { 
            background: #262421; 
            padding: 24px; 
            border-radius: 12px; 
            text-align: center; 
            width: 340px; 
            max-width: 90vw;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }
        
        .btn { 
            background: #81b64c; 
            color: #fff; 
            border: none; 
            padding: 14px 20px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            margin: 8px 0; 
            width: 100%; 
            font-size: 1.05rem; 
            box-sizing: border-box;
            box-shadow: 0 3px 0 #6c993f;
            transition: all 0.1s ease;
        }
        .btn:hover { background: #a3d96c; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #6c993f; }
        
        .btn-danger { background: #b23b3b; box-shadow: 0 3px 0 #8c2e2e; }
        .btn-danger:hover { background: #d95353; }
        .btn-danger:active { box-shadow: 0 1px 0 #8c2e2e; }
        
        input, select { 
            padding: 12px; 
            text-align: center; 
            width: 100%; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 2px solid #403e3b; 
            background: #1a1917; 
            color: white; 
            font-size: 1.1rem;
            font-weight: bold;
            box-sizing: border-box;
        }
        input { text-transform: uppercase; letter-spacing: 2px; }
        input:focus, select:focus { border-color: #81b64c; outline: none; }
        select { text-align-last: center; cursor: pointer; }
        
        .hidden { display: none !important; }
        #status-text { margin: 12px 0; font-size: 1.15rem; font-weight: bold; color: #f7f7f7; }
        p.instruction { font-size: 0.85rem; color: #bababa; margin: 12px 0 5px 0; line-height: 1.4; }
        label { font-size: 0.85rem; color: #aaa; display: block; margin-top: 5px; font-weight: bold; text-align: left; }
    </style>
</head>
<body>

    <h1>Mini Chess Challenge</h1>
    
    <div class="clocks-container hidden" id="clocks-ui">
        <div id="white-clock" class="clock">05:00</div>
        <div id="black-clock" class="clock">05:00</div>
    </div>
    
    <div class="menu" id="menu">
        <div id="lobby-ui">
            <label for="time-select">CHOOSE GAME TIME:</label>
            <select id="time-select">
                <option value="60">1 Minute (Bullet)</option>
                <option value="180">3 Minutes (Blitz)</option>
                <option value="300" selected>5 Minutes (Blitz)</option>
                <option value="600">10 Minutes (Rapid)</option>
                <option value="1800">30 Minutes (Classical)</option>
            </select>
            
            <div style="margin: 15px 0; color: #403e3b; font-weight: bold; border-top: 2px dashed #403e3b; padding-top: 10px;"></div>

            <button class="btn" id="create-btn">Create Challenge</button>
            <div style="margin: 10px 0; color: #aaa; font-size: 0.9rem; font-weight: bold;">— OR —</div>
            <input type="text" id="join-code" placeholder="ENTER 5-DIGIT CODE" maxlength="5">
            <button class="btn" id="join-btn">Join Challenge</button>
        </div>

        <div id="waiting-ui" class="hidden">
            <p id="status-text">Waiting for opponent...</p>
            
            <div id="setup-tools" class="hidden">
                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>
                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>
                <p class="instruction">Drag pieces onto the board from the sides, or drop them off-board to delete them.</p>
            </div>
        </div>
    </div>

    <div id="board"></div>

    <div id="game-over-ui" class="hidden" style="text-align: center; margin-top: 15px; width: 340px;">
        <button class="btn" id="home-btn" onclick="goToHomeScreen()">Return to Home Screen</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;
        let isHost = false;

        // Custom Time Engine Variables
        let whiteTime = 300;
        let blackTime = 300;
        let clockInterval = null;

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: '{piece}.png', 
            onDragStart: onDragStart,
            onDrop: onDrop
        });

        // Formats seconds into clean 00:00 notation and applies color styling to the active side
        function updateClockDisplay() {
            let wMin = Math.floor(whiteTime / 60).toString().padStart(2, '0');
            let wSec = (whiteTime % 60).toString().padStart(2, '0');
            let bMin = Math.floor(blackTime / 60).toString().padStart(2, '0');
            let bSec = (blackTime % 60).toString().padStart(2, '0');

            $('#white-clock').text(`${wMin}:${wSec}`);
            $('#black-clock').text(`${bMin}:${bSec}`);

            if (game.turn() === 'w') {
                $('#white-clock').addClass('active-clock');
                $('#black-clock').removeClass('active-clock');
            } else {
                $('#black-clock').addClass('active-clock');
                $('#white-clock').removeClass('active-clock');
            }
        }

        // Active game countdown loop handling timeouts
        function startClockTimer() {
            if (clockInterval) clearInterval(clockInterval);
            
            clockInterval = setInterval(() => {
                if (game.game_over()) {
                    clearInterval(clockInterval);
                    return;
                }

                if (game.turn() === 'w') {
                    whiteTime--;
                    if (whiteTime <= 0) {
                        clearInterval(clockInterval);
                        alert("Time out! Black wins!");
                        $('#game-over-ui').removeClass('hidden');
                    }
                } else {
                    blackTime--;
                    if (blackTime <= 0) {
                        clearInterval(clockInterval);
                        alert("Time out! White wins!");
                        $('#game-over-ui').removeClass('hidden');
                    }
                }
                updateClockDisplay();
            }, 1000);
        }

        // Listens to time settings changes from the dropdown inside the lobby
        $('#time-select').on('change', function() {
            let selectedSeconds = parseInt($(this).val());
            whiteTime = selectedSeconds;
            blackTime = selectedSeconds;
        });

        // UNIFIED NETWORK DATA LISTENER
        function attachDataListener(connection) {
            connection.on('data', data => {
                if (data.type === 'setup') {
                    // Pull custom time durations received from host setup configurations
                    whiteTime = data.gameDuration;
                    blackTime = data.gameDuration;
                    startGame(data.fen, 'black');
                } else if (data.type === 'move') {
                    game.move(data.moveObj);
                    board.position(game.fen());
                    
                    // Sync clocks with incoming move properties to stop drift latency
                    whiteTime = data.wTime;
                    blackTime = data.bTime;
                    updateClockDisplay();
                    
                    setTimeout(checkGameOver, 250); 
                }
            });
        }

        // HOST Logic Initialization
        function initHostPeer(id) {
            peer = new Peer('minichess-room-' + id, { 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            });
            
            peer.on('connection', c => {
                conn = c;
                isHost = true;
                
                $('#setup-tools').show();
                $('#status-text').text("Opponent Joined! Set your pieces.");
                
                board = Chessboard('board', {
                    draggable: true,
                    dropOffBoard: 'trash',
                    sparePieces: true,
                    position: 'start',
                    pieceTheme: '{piece}.png'
                });

                attachDataListener(conn);
            });
        }

        function clearBoard() { 
            board.clear(false); 
        }

        function confirmSetup() {
            let fen = board.fen() + " w KQkq - 0 1"; 
            
            try {
                let valid = game.load(fen);
                if (!valid) {
                    alert("Invalid setup! Make sure both kings are on the board and not in an impossible double check.");
                    return;
                }
            } catch(e) {
                alert("Invalid piece layout. Please check king placement.");
                return;
            }

            // Packaging custom time layout alongside setup transmission payload
            let selectedDuration = parseInt($('#time-select').val());
            if (conn && conn.open) {
                conn.send({ 
                    type: 'setup', 
                    fen: fen,
                    gameDuration: selectedDuration 
                });
            }
            
            whiteTime = selectedDuration;
            blackTime = selectedDuration;
            startGame(fen, 'white');
        }

        function startGame(fen, color) {
            $('#menu').hide();
            $('#clocks-ui').removeClass('hidden'); // Reveal clocks UI container
            
            game.load(fen);
            board = Chessboard('board', { 
                draggable: true, 
                position: fen, 
                pieceTheme: '{piece}.png',
                onDragStart: onDragStart, 
                onDrop: onDrop 
            });
            
            if (color === 'black') {
                board.orientation('black');
            }

            updateClockDisplay();
            startClockTimer();
        }

        $('#create-btn').on('click', () => {
            let code = Math.floor(10000 + Math.random() * 90000).toString(); 
            initHostPeer(code);
            
            $('#lobby-ui').hide();
            $('#waiting-ui').show();
            $('#status-text').text("Challenge Code: " + code);
        });

        $('#join-btn').on('click', () => {
            let code = $('#join-code').val().trim();
            if (!code) { alert("Please enter a room code!"); return; }
            
            peer = new Peer({ 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            }); 
            
            peer.on('open', () => {
                conn = peer.connect('minichess-room-' + code);
                
                $('#lobby-ui').hide();
                $('#waiting-ui').show();
                $('#status-text').text("Waiting for Host to set board...");
                
                conn.on('open', () => {
                    attachDataListener(conn);
                });
            });
        });

        function onDragStart(source, piece, position, orientation) {
            // Freeze piece pick-ups if game is over or clocks completely expire
            if (game.game_over() || whiteTime <= 0 || blackTime <= 0) return false;

            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            let moveObj = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveObj);
            
            if (move === null) return 'snapback';
            
            board.position(game.fen());
            
            // Send current active time metrics to keep other system calibrated
            if (conn && conn.open) {
                conn.send({ 
                    type: 'move', 
                    moveObj: moveObj,
                    wTime: whiteTime,
                    bTime: blackTime
                });
            }

            setTimeout(checkGameOver, 250); 
        }

        function checkGameOver() {
            if (game.game_over()) {
                if (clockInterval) clearInterval(clockInterval); // Freeze clocks on game over conditions
                
                if (game.in_checkmate()) {
                    let loser = game.turn() === 'w' ? 'White' : 'Black';
                    let winner = loser === 'White' ? 'Black' : 'White';
                    alert("Checkmate! " + winner + " wins the match!");
                } else if (game.in_stalemate()) {
                    alert("Game Over: Draw by Stalemate!");
                } else if (game.in_threefold_repetition()) {
                    alert("Game Over: Draw by Threefold Repetition!");
                } else if (game.insufficient_material()) {
                    alert("Game Over: Draw due to Insufficient Material!");
                } else if (game.in_draw()) {
                    alert("Game Over: Draw by 50-move rule!");
                }
                
                $('#game-over-ui').removeClass('hidden');
            }
        }

        // Completely wipes configurations to start standard new setup rooms
        function goToHomeScreen() {
            if (clockInterval) clearInterval(clockInterval);
            
            $('#game-over-ui').addClass('hidden');
            $('#clocks-ui').addClass('hidden');
            
            $('#menu').show();
            $('#lobby-ui').show();
            $('#waiting-ui').addClass('hidden');
            $('#setup-tools').addClass('hidden');
            $('#status-text').text("Waiting for opponent...");
            
            $('#join-code').val('');

            if (conn) { conn.close(); conn = null; }
            if (peer) { peer.destroy(); peer = null; }
            
            isHost = false;
            game = new Chess();
            
            // Re-sync back to default 5 min placeholder value on application reset
            whiteTime = 300;
            blackTime = 300;
            $('#time-select').val("300");
            
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                pieceTheme: '{piece}.png', 
                onDragStart: onDragStart,
                onDrop: onDrop
            });
        }
    </script>
</body>
</html>
