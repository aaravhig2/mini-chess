<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instant Chess</title>
    <style>
        body { font-family: sans-serif; background: #302e2b; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); border: 4px solid #404040; }
        .square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; user-select: none; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { background-color: #7b973c !important; }
        .btn { background: #81b64c; color: #fff; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; margin-top: 20px; }
        #status { margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Simplified Local Chess</h1>
    <div id="status">White's Turn</div>
    <div id="board" class="grid"></div>
    <button class="btn" onclick="resetGame()">Reset Board</button>

    <script>
        // Standard starting board configuration layout using raw text emoji characters
        const startLayout = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        let boardState = JSON.parse(JSON.stringify(startLayout));
        let selectedSquare = null;
        let currentTurn = 'white'; // white moves white pieces, black moves black pieces

        function isWhitePiece(piece) {
            return ['♙','♖','♘','♗','♕','♔'].includes(piece);
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    square.innerText = boardState[r][c];
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    square.addEventListener('click', () => handleSquareClick(r, c));
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            
            // If no piece is currently selected
            if (selectedSquare === null) {
                if (!piece) return;
                
                // Turn enforcement check
                if (currentTurn === 'white' && !isWhitePiece(piece)) return;
                if (currentTurn === 'black' && isWhitePiece(piece)) return;
                
                selectedSquare = { row: r, col: c };
                highlightSquare(r, c);
            } else {
                // If clicking the exact same square twice, unselect it
                if (selectedSquare.row === r && selectedSquare.col === c) {
                    selectedSquare = null;
                    createBoard();
                    return;
                }
                
                // Execute move execution update logic
                boardState[r][c] = boardState[selectedSquare.row][selectedSquare.col];
                boardState[selectedSquare.row][selectedSquare.col] = '';
                
                selectedSquare = null;
                currentTurn = currentTurn === 'white' ? 'black' : 'white';
                document.getElementById('status').innerText = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s Turn`;
                
                createBoard();
            }
        }

        function highlightSquare(r, c) {
            createBoard(); // Reset highlights
            const index = r * 8 + c;
            document.getElementById('board').children[index].classList.add('selected');
        }

        function resetGame() {
            boardState = JSON.parse(JSON.stringify(startLayout));
            currentTurn = 'white';
            document.getElementById('status').innerText = "White's Turn";
            selectedSquare = null;
            createBoard();
        }

        // Initialize display configuration on launch
        createBoard();
    </script>
</body>
</html>
