<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        /* Modern UI Styles */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #302e2b; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        h1 { margin-top: 10px; margin-bottom: 5px; font-size: 2rem; letter-spacing: 0.5px; }
        
        #board { 
            width: 400px; 
            max-width: 90vw; 
            margin: 15px 0; 
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        
        .menu { 
            background: #262421; 
            padding: 24px; 
            border-radius: 12px; 
            text-align: center; 
            width: 340px; 
            max-width: 90vw;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .btn { 
            background: #81b64c; 
            color: #fff; 
            border: none; 
            padding: 14px 20px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            margin: 8px 0; 
            width: 100%; 
            font-size: 1.05rem; 
            box-sizing: border-box;
            box-shadow: 0 3px 0 #6c993f;
            transition: all 0.1s ease;
        }
        .btn:hover { background: #a3d96c; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #6c993f; }
        
        .btn-danger { background: #b23b3b; box-shadow: 0 3px 0 #8c2e2e; }
        .btn-danger:hover { background: #d95353; }
        .btn-danger:active { box-shadow: 0 1px 0 #8c2e2e; }
        
        input { 
            padding: 12px; 
            text-transform: uppercase; 
            text-align: center; 
            width: 100%; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 2px solid #403e3b; 
            background: #1a1917; 
            color: white; 
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-sizing: border-box;
        }
        input:focus { border-color: #81b64c; outline: none; }
        
        .hidden { display: none !important; }
        #status-text { margin: 12px 0; font-size: 1.15rem; font-weight: bold; color: #f7f7f7; }
        p.instruction { font-size: 0.85rem; color: #bababa; margin: 12px 0 5px 0; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>Mini Chess Challenge</h1>
    
    <div class="menu" id="menu">
        <div id="lobby-ui">
            <button class="btn" id="create-btn">Create Challenge</button>
            <div style="margin: 10px 0; color: #aaa; font-size: 0.9rem; font-weight: bold;">— OR —</div>
            <input type="text" id="join-code" placeholder="ENTER 5-DIGIT CODE" maxlength="5">
            <button class="btn" id="join-btn">Join Challenge</button>
        </div>

        <div id="waiting-ui" class="hidden">
            <p id="status-text">Waiting for opponent...</p>
            
            <div id="setup-tools" class="hidden">
                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>
                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>
                <p class="instruction">Drag pieces onto the board from the sides, or drop them off-board to delete them.</p>
            </div>
        </div>
    </div>

    <div id="board"></div>

    <div id="game-over-ui" class="hidden" style="text-align: center; margin-top: 15px; width: 340px;">
        <button class="btn" id="home-btn" onclick="goToHomeScreen()">Return to Home Screen</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;
        let isHost = false;

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: '{piece}.png', 
            onDragStart: onDragStart,
            onDrop: onDrop
        });

        // UNIFIED NETWORK LISTENER: Fixes the Host not syncing and updates visuals for Castling/En Passant
        function attachDataListener(connection) {
            connection.on('data', data => {
                if (data.type === 'setup') {
                    startGame(data.fen, 'black');
                } else if (data.type === 'move') {
                    game.move(data.moveObj);
                    
                    // Force the visual board to snap perfectly to the engine state (fixes Castling Rook)
                    board.position(game.fen());
                    
                    setTimeout(checkGameOver, 250); 
                }
            });
        }

        // HOST Logic
        function initHostPeer(id) {
            peer = new Peer('minichess-room-' + id, { 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            });
            
            peer.on('connection', c => {
                conn = c;
                isHost = true;
                
                $('#setup-tools').show();
                $('#status-text').text("Opponent Joined! Set your pieces.");
                
                board = Chessboard('board', {
                    draggable: true,
                    dropOffBoard: 'trash',
                    sparePieces: true,
                    position: 'start',
                    pieceTheme: '{piece}.png'
                });

                // Attach listener so the host can hear the guest's moves!
                attachDataListener(conn);
            });
        }

        function clearBoard() { 
            board.clear(false); 
        }

        function confirmSetup() {
            // Added KQkq to default to allowing castling if pieces are placed on starting squares
            let fen = board.fen() + " w KQkq - 0 1"; 
            
            try {
                let valid = game.load(fen);
                if (!valid) {
                    alert("Invalid setup! Make sure both kings are on the board and not in an impossible double check.");
                    return;
                }
            } catch(e) {
                alert("Invalid piece layout. Please check king placement.");
                return;
            }

            if (conn && conn.open) {
                conn.send({ type: 'setup', fen: fen });
            }
            startGame(fen, 'white');
        }

        function startGame(fen, color) {
            $('#menu').hide();
            
            game.load(fen);
            board = Chessboard('board', { 
                draggable: true, 
                position: fen, 
                pieceTheme: '{piece}.png',
                onDragStart: onDragStart, 
                onDrop: onDrop 
            });
            
            if (color === 'black') {
                board.orientation('black');
            }
        }

        $('#create-btn').on('click', () => {
            let code = Math.floor(10000 + Math.random() * 90000).toString(); 
            initHostPeer(code);
            
            $('#lobby-ui').hide();
            $('#waiting-ui').show();
            $('#status-text').text("Challenge Code: " + code);
        });

        $('#join-btn').on('click', () => {
            let code = $('#join-code').val().trim();
            if (!code) { alert("Please enter a room code!"); return; }
            
            peer = new Peer({ 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            }); 
            
            peer.on('open', () => {
                conn = peer.connect('minichess-room-' + code);
                
                $('#lobby-ui').hide();
                $('#waiting-ui').show();
                $('#status-text').text("Waiting for Host to set board...");
                
                conn.on('open', () => {
                    // Attach listener so guest can hear host's setup and moves!
                    attachDataListener(conn);
                });
            });
        });

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            let moveObj = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveObj);
            
            if (move === null) return 'snapback';
            
            // Fixes Castling/En Passant on your local screen immediately
            board.position(game.fen());
            
            if (conn && conn.open) {
                conn.send({ type: 'move', moveObj: moveObj });
            }

            setTimeout(checkGameOver, 250); 
        }

        function checkGameOver() {
            if (game.game_over()) {
                if (game.in_checkmate()) {
                    let loser = game.turn() === 'w' ? 'White' : 'Black';
                    let winner = loser === 'White' ? 'Black' : 'White';
                    alert("Checkmate! " + winner + " wins the match!");
                } else if (game.in_stalemate()) {
                    alert("Game Over: Draw by Stalemate!");
                } else if (game.in_threefold_repetition()) {
                    alert("Game Over: Draw by Threefold Repetition!");
                } else if (game.insufficient_material()) {
                    alert("Game Over: Draw due to Insufficient Material!");
                } else if (game.in_draw()) {
                    alert("Game Over: Draw by 50-move rule!");
                }
                
                // Show the return home button
                $('#game-over-ui').removeClass('hidden');
            }
        }

        // Wipe memory and return to lobby
        function goToHomeScreen() {
            $('#game-over-ui').addClass('hidden');
            
            $('#menu').show();
            $('#lobby-ui').show();
            $('#waiting-ui').addClass('hidden');
            $('#setup-tools').addClass('hidden');
            $('#status-text').text("Waiting for opponent...");
            
            $('#join-code').val('');

            // Kill connections
            if (conn) { conn.close(); conn = null; }
            if (peer) { peer.destroy(); peer = null; }
            
            isHost = false;
            game = new Chess();
            
            // Re-render empty standard board
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                pieceTheme: '{piece}.png', 
                onDragStart: onDragStart,
                onDrop: onDrop
            });
        }
    </script>
</body>
</html>
