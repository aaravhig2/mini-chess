<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Chess Custom Engine with Clocks</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; background: #302e2b; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #board { width: 400px; max-width: 90vw; margin: 10px 0; }
        .menu { background: #262421; padding: 20px; border-radius: 8px; text-align: center; width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); margin-bottom: 15px; }
        .btn { background: #81b64c; color: #fff; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px; width: 90%; font-size: 1rem; }
        .btn:hover { background: #a3d96c; }
        .btn-danger { background: #b23b3b; }
        .btn-danger:hover { background: #d95353; }
        input { padding: 10px; text-transform: uppercase; text-align: center; width: 85%; margin: 5px; border-radius: 4px; border: 1px solid #403e3b; background: #1a1917; color: white; }
        .hidden { display: none; }
        #status-text { margin: 10px 0; font-size: 1.1rem; font-weight: bold; }
        
        /* Visible Clocks Styling */
        .clocks-container { display: flex; justify-content: space-between; width: 400px; max-width: 90vw; margin: 15px 0; font-family: monospace; font-size: 1.8rem; font-weight: bold; }
        .clock { background: #1a1917; padding: 10px 20px; border-radius: 6px; border: 2px solid #403e3b; width: 120px; text-align: center; color: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .active-clock { border-color: #81b64c; color: #81b64c; background: #222521; }
    </style>
</head>
<body>

    <h1>Mini Chess Challenge</h1>
    
    <div class="clocks-container">
        <div id="white-clock" class="clock">05:00</div>
        <div id="black-clock" class="clock">05:00</div>
    </div>

    <div class="menu" id="menu">
        <div id="lobby-ui">
            <button class="btn" id="create-btn">Create Challenge</button>
            <input type="text" id="join-code" placeholder="ENTER CHALLENGE CODE" maxlength="5">
            <button class="btn" id="join-btn">Join Challenge</button>
        </div>

        <div id="waiting-ui" class="hidden">
            <p id="status-text">Waiting for opponent...</p>
            
            <div id="setup-tools" class="hidden">
                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>
                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>
            </div>
        </div>
    </div>

    <div id="board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;
        let isHost = false;
        
        // Clock configurations (300 seconds total)
        let whiteTime = 300;
        let blackTime = 300;
        let clockInterval = null;

        // Initialize standard board looking at your main directory for pieces
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: '{piece}.png', 
            onDragStart: onDragStart,
            onDrop: onDrop
        });

        // HOST Logic: Starts Peer with network configuration
        function initHostPeer(id) {
            peer = new Peer('minichess-room-' + id, { 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            });
            
            peer.on('connection', c => {
                conn = c;
                isHost = true;
                
                $('#setup-tools').show();
                $('#status-text').text("Opponent Joined! Set your pieces.");
                
                // Rebuild board layout to handle custom puzzle building mechanics
                board = Chessboard('board', {
                    draggable: true,
                    dropOffBoard: 'trash',
                    sparePieces: true,
                    position: 'start',
                    pieceTheme: '{piece}.png'
                });

                listenForData();
            });
        }

        function clearBoard() { board.clear(false); }

        // Setup Function: Host locks in layout and broadcasts it to Guest
        function confirmSetup() {
            let fen = board.fen() + " w - - 0 1"; 
            
            try {
                let valid = game.load(fen);
                if (!valid) {
                    alert("Invalid setup! Check king placement.");
                    return;
                }
            } catch(e) {
                alert("Invalid piece layout.");
                return;
            }

            // Secure channel validation prior to initial state broadcasting
            if (conn && conn.open) {
                conn.send({ type: 'setup', fen: fen });
            }
            startGame(fen, 'white');
        }

        // Activates strict game rules, locks roles, starts clocks
        function startGame(fen, color) {
            $('#menu').hide();
            
            game.load(fen);
            board = Chessboard('board', { 
                draggable: true, 
                position: fen, 
                pieceTheme: '{piece}.png',
                onDragStart: onDragStart, 
                onDrop: onDrop 
            });
            
            if (color === 'black') {
                board.orientation('black');
            }

            updateClockDisplay();
            startClockTimer();
        }

        // Shared network data listener to capture updates
        function listenForData() {
            conn.on('data', data => {
                if (data.type === 'setup') {
                    startGame(data.fen, 'black');
                } else if (data.type === 'move') {
                    game.move(data.moveObj);
                    board.position(game.fen());
                    
                    // Direct synchronization override utilizing timestamp payloads
                    whiteTime = data.wTime;
                    blackTime = data.bTime;
                    updateClockDisplay();

                    setTimeout(checkGameOver, 250);
                }
            });
        }

        // UI TRIGGER: Create Room
        $('#create-btn').on('click', () => {
            let code = Math.floor(10000 + Math.random() * 90000).toString();
            initHostPeer(code);
            $('#lobby-ui').hide();
            $('#waiting-ui').show();
            $('#status-text').text("Challenge Code: " + code);
        });

        // UI TRIGGER: Join Room
        $('#join-btn').on('click', () => {
            let code = $('#join-code').val().trim();
            if (!code) { alert("Please enter a room code!"); return; }
            
            peer = new Peer({ 
                debug: 2,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            }); 
            
            peer.on('open', () => {
                conn = peer.connect('minichess-room-' + code);
                $('#lobby-ui').hide();
                $('#waiting-ui').show();
                $('#status-text').text("Connecting to Host...");
                
                conn.on('open', () => {
                    $('#status-text').text("Connected! Waiting for Host setup...");
                    listenForData();
                });
            });
        });

        // Anti-Cheat tracking rules
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || whiteTime <= 0 || blackTime <= 0) return false;

            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        // Handles local movement execution loops and triggers outgoing data packets
        function onDrop(source, target) {
            let moveObj = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveObj);
            
            if (move === null) return 'snapback';
            
            // Appends local clock registers into payload array to resolve packet loss synchronization drift
            if (conn && conn.open) {
                conn.send({ 
                    type: 'move', 
                    moveObj: moveObj,
                    wTime: whiteTime,
                    bTime: blackTime
                });
            }

            setTimeout(checkGameOver, 250);
        }

        // Active countdown loop
        function startClockTimer() {
            if (clockInterval) clearInterval(clockInterval);
            
            clockInterval = setInterval(() => {
                if (game.game_over()) {
                    clearInterval(clockInterval);
                    return;
                }

                if (game.turn() === 'w') {
                    whiteTime--;
                    if (whiteTime <= 0) {
                        clearInterval(clockInterval);
                        alert("Time out! Black wins!");
