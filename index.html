<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; background: #302e2b; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #board { width: 400px; max-width: 90vw; margin: 20px 0; }
        .menu { background: #262421; padding: 20px; border-radius: 8px; text-align: center; width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .btn { background: #81b64c; color: #fff; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px; width: 90%; font-size: 1rem; }
        .btn:hover { background: #a3d96c; }
        .btn-danger { background: #b23b3b; }
        .btn-danger:hover { background: #d95353; }
        input { padding: 10px; text-transform: uppercase; text-align: center; width: 85%; margin: 5px; border-radius: 4px; border: 1px solid #403e3b; background: #1a1917; color: white; }
        .hidden { display: none; }
        #status-text { margin: 10px 0; font-size: 1.1rem; font-weight: bold; }
        p.instruction { font-size: 0.8rem; color: #aaa; margin: 5px 0; }
    </style>
</head>
<body>

    <h1>Mini Chess Challenge</h1>
    
    <div class="menu" id="menu">
        <div id="lobby-ui">
            <button class="btn" id="create-btn">Create Challenge</button>
            <input type="text" id="join-code" placeholder="ENTER CHALLENGE CODE" maxlength="5">
            <button class="btn" id="join-btn">Join Challenge</button>
        </div>

        <div id="waiting-ui" class="hidden">
            <p id="status-text">Waiting for opponent...</p>
            
            <div id="setup-tools" class="hidden">
                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>
                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>
                <p class="instruction">Drag pieces onto the board from outside or trash them off-board.</p>
            </div>
        </div>
    </div>

    <div id="board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;
        let isHost = false;

        // Initialize standard board looking at your main directory for pieces (wP.png, bK.png)
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: '{piece}.png', 
            onDragStart: onDragStart,
            onDrop: onDrop
        });

        // HOST Logic: Starts Peer and waits for Guest connection
        function initHostPeer(id) {
            peer = new Peer('minichess-room-' + id, { debug: 2 });
            
            peer.on('connection', c => {
                conn = c;
                isHost = true;
                
                // Flip Host board to Setup Mode configuration
                $('#setup-tools').show();
                $('#status-text').text("Opponent Joined! Set your pieces.");
                
                // Rebuild board with spare pieces enabled for puzzle construction
                board = Chessboard('board', {
                    draggable: true,
                    dropOffBoard: 'trash',
                    sparePieces: true,
                    position: 'start',
                    pieceTheme: '{piece}.png'
                });
            });
        }

        // Setup Function: Host clears layout completely
        function clearBoard() { 
            board.clear(false); 
        }

        // Setup Function: Host locks in layout and broadcasts it to Guest
        function confirmSetup() {
            // Get piece placement layout and hardcode standard active game rules to prevent chess.js crashing
            let fen = board.fen() + " w - - 0 1"; 
            
            // Test if generated FEN is legal inside engine rule parser
            try {
                let valid = game.load(fen);
                if (!valid) {
                    alert("Invalid setup! Make sure both kings are on the board and not in an impossible double check.");
                    return;
                }
            } catch(e) {
                alert("Invalid piece layout. Please check king placement.");
                return;
            }

            // Sync with Guest
            conn.send({ type: 'setup', fen: fen });
            startGame(fen, 'white');
        }

        // Activates strict game rules, hides menus, locks roles
        function startGame(fen, color) {
            $('#menu').hide();
            
            game.load(fen);
            board = Chessboard('board', { 
                draggable: true, 
                position: fen, 
                pieceTheme: '{piece}.png',
                onDragStart: onDragStart, 
                onDrop: onDrop 
            });
            
            if (color === 'black') {
                board.orientation('black');
            }
        }

        // UI TRIGGER: Clicking Create Challenge
        $('#create-btn').on('click', () => {
            let code = Math.floor(10000 + Math.random() * 90000).toString(); // 5 digit numeric code
            initHostPeer(code);
            
            $('#lobby-ui').hide();
            $('#waiting-ui').show();
            $('#status-text').text("Challenge Code: " + code);
        });

        // UI TRIGGER: Clicking Join Challenge
        $('#join-btn').on('click', () => {
            let code = $('#join-code').val().trim();
            if (!code) { alert("Please enter a room code!"); return; }
            
            peer = new Peer(); // Fresh peer instance initialization for Guest
            
            peer.on('open', () => {
                conn = peer.connect('minichess-room-' + code);
                
                $('#lobby-ui').hide();
                $('#waiting-ui').show();
                $('#status-text').text("Waiting for Host to set board...");
                
                conn.on('open', () => {
                    // Listens for incoming signals from host
                    conn.on('data', data => {
                        if (data.type === 'setup') {
                            startGame(data.fen, 'black');
                        } else if (data.type === 'move') {
                            game.move(data.moveObj);
                            board.position(game.fen());
                        }
                    });
                });
            });
        });

        // Anti-Cheat: Stops players from moving opposing colors on their turns
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Restrict pick up control based on local side color setting
            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            // Restrict turns matching current engine status
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        // Network Output: Transmits movement package on drop complete
        function onDrop(source, target) {
            let moveObj = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveObj);
            
            if (move === null) return 'snapback';
            
            if (conn) {
                conn.send({ type: 'move', moveObj: moveObj });
            }
        }
    </script>
</body>
</html>
