    <!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Mini Chess</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

    <style>

        * { box-sizing: border-box; }



        body {

            overflow-x: hidden;

            font-family: sans-serif;

            background: #302e2b;

            color: #fff;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            padding: 16px;

        }



        h1 {

            font-size: clamp(1.2rem, 5vw, 1.8rem);

            margin: 10px 0;

            text-align: center;

        }



        #board {

            width: min(400px, calc(100vw - 32px));

            margin: 14px 0;

        }



        .zoom-controls {

            display: flex;

            align-items: center;

            gap: 12px;

            margin-top: 10px;

        }



        .zoom-btn {

            background: #3a3835;

            color: #fff;

            border: none;

            width: 44px;

            height: 44px;

            border-radius: 6px;

            font-size: 1.5rem;

            font-weight: bold;

            line-height: 1;

            cursor: pointer;

            -webkit-tap-highlight-color: transparent;

        }



        .zoom-btn:active { background: #4f4c48; }



        #zoom-label {

            font-size: 0.9rem;

            color: #aaa;

            min-width: 42px;

            text-align: center;

        }



        .menu {

            background: #262421;

            padding: 20px 16px;

            border-radius: 8px;

            text-align: center;

            width: min(340px, 92vw);

            box-shadow: 0 4px 10px rgba(0,0,0,0.4);

        }



        .btn {

            background: #81b64c;

            color: #fff;

            border: none;

            padding: 14px 20px;

            cursor: pointer;

            border-radius: 6px;

            font-weight: bold;

            margin: 6px auto;

            width: 100%;

            font-size: 1rem;

            display: block;

            /* Better tap targets on mobile */

            min-height: 48px;

            -webkit-tap-highlight-color: transparent;

        }



        .btn:hover, .btn:active { background: #a3d96c; }

        .btn-danger { background: #b23b3b; }

        .btn-danger:hover, .btn-danger:active { background: #d95353; }



        input {

            padding: 13px 10px;

            text-transform: uppercase;

            text-align: center;

            width: 100%;

            margin: 6px 0;

            border-radius: 6px;

            border: 1px solid #403e3b;

            background: #1a1917;

            color: white;

            font-size: 1.1rem;

            /* Prevents iOS zoom on focus */

            font-size: max(16px, 1rem);

            -webkit-tap-highlight-color: transparent;

        }



        .hidden { display: none; }



        #status-text {

            margin: 10px 0;

            font-size: clamp(0.95rem, 4vw, 1.1rem);

            font-weight: bold;

            line-height: 1.4;

        }



        p.instruction {

            font-size: 0.82rem;

            color: #aaa;

            margin: 6px 0;

            line-height: 1.4;

        }



        /* Make chessboard pieces easier to drag on touch screens */

        .board-b72b1 .piece-417db {

            cursor: grab;

        }

    </style>

</head>

<body>



    <h1>Mini Chess Challenge</h1>

    

    <div class="menu" id="menu">

        <div id="lobby-ui">

            <button class="btn" id="create-btn">Create Challenge</button>

            <input type="text" id="join-code" placeholder="ENTER CHALLENGE CODE" maxlength="5">

            <button class="btn" id="join-btn">Join Challenge</button>

        </div>



        <div id="waiting-ui" class="hidden">

            <p id="status-text">Waiting for opponent...</p>

            

            <div id="setup-tools" class="hidden">

                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>

                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>

                <p class="instruction">Drag pieces onto the board from outside or trash them off-board.</p>

            </div>

        </div>

    </div>



    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out" type="button">−</button>
        <span id="zoom-label">100%</span>
        <button class="zoom-btn" id="zoom-in" type="button">+</button>
    </div>

    <div id="board"></div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>



    <script>

    $(document).ready(function() {

        // Responsive board size: fits within both screen width AND height

        // (accounting for the menu, and the spare-piece trays during setup)

        let currentExtraRows = 0; // 2 when spare-piece trays are shown during setup



        function getBoardSize(extraRows) {

            const maxWidthBased = Math.min(400, window.innerWidth - 32);



            const menuEl = document.getElementById('menu');

            const h1El = document.querySelector('h1');

            const menuHeight = menuEl ? menuEl.offsetHeight : 0;

            const h1Height = h1El ? h1El.offsetHeight : 0;

            const availableHeight = window.innerHeight - menuHeight - h1Height - 80;



            const rows = 8 + extraRows; // spare rows count toward total height

            const maxHeightBased = Math.floor((availableHeight / rows) * 8);



            return Math.max(200, Math.min(maxWidthBased, maxHeightBased));

        }



        // Updates #board's width to fit, and resizes the active board widget

        function sizeBoard(extraRows) {

            currentExtraRows = extraRows;

            const size = getBoardSize(extraRows);

            document.getElementById('board').style.width = size + 'px';

            if (board) board.resize();

            return size;

        }



        let game = new Chess();

        let board = null;

        let peer = null;

        let conn = null;



        // Set board element size dynamically

        sizeBoard(0);



        // Initialize standard board looking at your main directory for pieces

        board = Chessboard('board', {

            draggable: true,

            position: 'start',

            pieceTheme: '{piece}.png',

            onDragStart: onDragStart,

            onDrop: onDrop

        });



        // Resize board when screen rotates or resizes

        window.addEventListener('resize', () => {

            sizeBoard(currentExtraRows);

        });



        // ZOOM CONTROLS: shrink/grow the whole board (incl. spare-piece trays)

        // so everything fits on screen without needing to scroll

        let boardZoom = 1;

        function applyZoom() {

            document.getElementById('board').style.zoom = boardZoom;

            document.getElementById('zoom-label').textContent = Math.round(boardZoom * 100) + '%';

        }

        $('#zoom-in').on('click', () => {

            boardZoom = Math.min(1.5, Math.round((boardZoom + 0.1) * 10) / 10);

            applyZoom();

        });

        $('#zoom-out').on('click', () => {

            boardZoom = Math.max(0.3, Math.round((boardZoom - 0.1) * 10) / 10);

            applyZoom();

        });



        // CENTRAL LOGIC: This handles incoming moves for BOTH players

        function setupDataListener() {

            conn.on('data', data => {

                if (data.type === 'setup') {

                    startGame(data.fen, 'black');

                } else if (data.type === 'move') {

                    game.move(data.moveObj);

                    board.position(game.fen());

                    setTimeout(checkGameOver, 250); 

                }

            });

        }



        // HOST Logic: Starts Peer with STUN configuration

        function initHostPeer(id) {

            peer = new Peer('minichess-room-' + id, { 

                debug: 2,

                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }

            });

            

            peer.on('connection', c => {

                conn = c;

                

                // Switch Host board to Setup Mode configuration

                $('#setup-tools').show();

                $('#status-text').text("Opponent Joined! Set your pieces.");



                // Critical Fix: Start listening to the Guest immediately!

                setupDataListener();



                // Board now has spare-piece rows above/below it - resize to fit

                sizeBoard(2);



                board = Chessboard('board', {

                    draggable: true,

                    dropOffBoard: 'trash',

                    sparePieces: true,

                    position: 'start',

                    pieceTheme: '{piece}.png'

                });

            });

        }



        // Setup Function: Host locks in layout and starts game

        function confirmSetup() {

            let fen = board.fen() + " w - - 0 1"; 

            try {

                let valid = game.load(fen);

                if (!valid) { alert("Invalid setup!"); return; }

            } catch(e) { alert("Invalid layout!"); return; }



            // Tell the guest what the board looks like

            if (conn) conn.send({ type: 'setup', fen: fen });

            startGame(fen, 'white');

        }



        // Activates strict game rules, hides menus, locks roles

        function startGame(fen, color) {

            $('#menu').hide();

            game.load(fen);

            sizeBoard(0);

            board = Chessboard('board', { 

                draggable: true, 

                position: fen, 

                pieceTheme: '{piece}.png',

                onDragStart: onDragStart, 

                onDrop: onDrop 

            });

            

            if (color === 'black') {

                board.orientation('black');

            }

        }



        // UI TRIGGER: Clicking Create Challenge

        $('#create-btn').on('click', () => {

            let code = Math.floor(10000 + Math.random() * 90000).toString();

            initHostPeer(code);

            $('#lobby-ui').hide();

            $('#waiting-ui').show();

            $('#status-text').text("Challenge Code: " + code);

        });



        // UI TRIGGER: Clicking Join Challenge

        $('#join-btn').on('click', () => {

            let code = $('#join-code').val().trim();

            if (!code) { alert("Please enter a room code!"); return; }

            

            peer = new Peer({ 

                debug: 2,

                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }

            }); 

            

            peer.on('open', () => {

                conn = peer.connect('minichess-room-' + code);

                $('#lobby-ui').hide();

                $('#waiting-ui').show();

                $('#status-text').text("Connecting to Host...");

                

                conn.on('open', () => {

                    $('#status-text').text("Connected! Waiting for Host setup...");

                    // Critical Fix: Start listening to the Host immediately!

                    setupDataListener();

                });

            });

        });



        // Anti-Cheat: Stops players from moving opposing colors on their turns

        function onDragStart(source, piece, position, orientation) {

            if (game.game_over()) return false;



            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||

                (orientation === 'black' && piece.search(/^w/) !== -1)) {

                return false;

            }

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||

                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {

                return false;

            }

        }



        // Network Output: Transmits movement package on drop complete

        function onDrop(source, target) {

            let moveObj = { from: source, to: target, promotion: 'q' };

            let move = game.move(moveObj);

            

            if (move === null) return 'snapback';

            

            if (conn) {

                conn.send({ type: 'move', moveObj: moveObj });

            }

            setTimeout(checkGameOver, 250);

        }



        function checkGameOver() {

            if (game.game_over()) {

                if (game.in_checkmate()) {

                    let loser = game.turn() === 'w' ? 'White' : 'Black';

                    let winner = loser === 'White' ? 'Black' : 'White';

                    alert("Checkmate! " + winner + " wins the match!");

                } else if (game.in_stalemate()) {

                    alert("Game Over: Draw by Stalemate!");

                } else if (game.in_draw()) {

                    alert("Game Over: Draw!");

                }

            }

        }



        // Expose functions used by inline onclick handlers

        window.clearBoard = () => board.clear();

        window.confirmSetup = confirmSetup;



    }); // end document.ready

    </script>

</body>

</html>
