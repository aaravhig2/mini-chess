<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Chess Custom Engine with Clocks</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; background: #302e2b; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #board { width: 400px; max-width: 90vw; margin: 10px 0; }
        .menu { background: #262421; padding: 20px; border-radius: 8px; text-align: center; width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); margin-bottom: 15px; }
        .btn { background: #81b64c; color: #fff; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px; width: 90%; font-size: 1rem; }
        .btn:hover { background: #a3d96c; }
        .btn-danger { background: #b23b3b; }
        .btn-danger:hover { background: #d95353; }
        input, select { padding: 10px; text-transform: uppercase; text-align: center; width: 85%; margin: 5px; border-radius: 4px; border: 1px solid #403e3b; background: #1a1917; color: white; font-weight: bold; }
        select { width: 92%; text-align-last: center; }
        .hidden { display: none; }
        #status-text { margin: 10px 0; font-size: 1.1rem; font-weight: bold; }
        label { font-size: 0.85rem; color: #aaa; display: block; margin-top: 10px; font-weight: bold; }
        
        /* Clock Layout Elements */
        .clocks-container { display: flex; justify-content: space-between; width: 400px; max-width: 90vw; margin: 15px 0; font-family: monospace; font-size: 1.8rem; font-weight: bold; }
        .clock { background: #1a1917; padding: 10px 20px; border-radius: 6px; border: 2px solid #403e3b; width: 120px; text-align: center; color: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .active-clock { border-color: #81b64c; color: #81b64c; background: #222521; }
    </style>
</head>
<body>

    <h1>Mini Chess Challenge</h1>
    
    <div class="clocks-container">
        <div id="white-clock" class="clock">05:00</div>
        <div id="black-clock" class="clock">05:00</div>
    </div>

    <div class="menu" id="menu">
        <div id="lobby-ui">
            <label for="time-select">CHOOSE GAME TIME:</label>
            <select id="time-select">
                <option value="60">1 Minute (Bullet)</option>
                <option value="180">3 Minutes (Blitz)</option>
                <option value="300" selected>5 Minutes (Blitz)</option>
                <option value="600">10 Minutes (Rapid)</option>
                <option value="1800">30 Minutes (Classical)</option>
            </select>
            <hr style="border: 0; border-top: 1px solid #403e3b; margin: 15px 0;">

            <button class="btn" id="create-btn">Create Challenge</button>
            <input type="text" id="join-code" placeholder="ENTER CHALLENGE CODE" maxlength="5">
            <button class="btn" id="join-btn">Join Challenge</button>
        </div>

        <div id="waiting-ui" class="hidden">
            <p id="status-text">Waiting for opponent...</p>
            
            <div id="setup-tools" class="hidden">
                <button class="btn btn-danger" onclick="clearBoard()">Clear Board</button>
                <button class="btn" onclick="confirmSetup()">Confirm Position & Start</button>
            </div>
        </div>
    </div>

    <div id="board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // Initialize Global State
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;
        let isHost = false;
        
        let whiteTime = 300;
        let blackTime = 300;
        let clockInterval = null;

        // Visual layout formatter
        function updateClockDisplay() {
            let wMin = Math.floor(whiteTime / 60).toString().padStart(2, '0');
            let wSec = (whiteTime % 60).toString().padStart(2, '0');
            let bMin = Math.floor(blackTime / 60).toString().padStart(2, '0');
            let bSec = (blackTime % 60).toString().padStart(2, '0');

            $('#white-clock').text(`${wMin}:${wSec}`);
            $('#black-clock').text(`${bMin}:${bSec}`);

            if (game.turn() === 'w') {
                $('#white-clock').addClass('active-clock');
                $('#black-clock').removeClass('active-clock');
            } else {
                $('#black-clock').addClass('active-clock');
                $('#white-clock').removeClass('active-clock');
            }
        }

        // Listen for changes on the time dropdown directly in the lobby
        $('#time-select').on('change', function() {
            let selectedSeconds = parseInt($(this).val());
            whiteTime = selectedSeconds;
            blackTime = selectedSeconds;
            updateClockDisplay();
        });

        // Active countdown loop
        function startClockTimer() {
            if (clockInterval) clearInterval(clockInterval);
            
            clockInterval = setInterval(() => {
                if (game.game_over()) {
                    clearInterval(clockInterval);
                    return;
                }

                if (game.turn() === 'w') {
                    whiteTime--;
                    if (whiteTime <= 0) {
                        clearInterval(clockInterval);
                        alert("Time out! Black wins!");
                    }
                } else {
                    blackTime--;
                    if (blackTime <= 0) {
                        clearInterval(clockInterval);
                        alert("Time out! White wins!");
                    }
                }
                updateClockDisplay();
            }, 1000);
        }

        // Engine Win/Draw Evaluator
        function checkGameOver() {
            if (game.game_over()) {
                clearInterval(clockInterval);
                if (game.in_checkmate()) {
                    let winner = game.turn() === 'w' ? 'Black' : 'White';
                    alert("Checkmate! " + winner + " wins the match!");
                } else if (game.in_stalemate()) {
                    alert("Game Over: Draw by Stalemate!");
                } else if (game.in_threefold_repetition()) {
                    alert("Game Over: Draw by Threefold Repetition!");
                } else if (game.insufficient_material()) {
                    alert("Game Over: Draw due to Insufficient Material!");
                } else if (game.in_draw()) {
                    alert("Game Over: Draw!");
                }
            }
        }

        // Anti-Cheat tracking rules
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || whiteTime <= 0 || blackTime <= 0) return false;

            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        // Handles local movement execution loops and triggers outgoing data packets
        function onDrop(source, target) {
            let moveObj = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveObj);
            
            if (move === null) return 'snapback';
            
            if (conn && conn.open) {
                conn.send({ 
                    type: 'move', 
                    moveObj: moveObj,
                    wTime: whiteTime,
                    bTime: blackTime
                });
            }

            setTimeout(checkGameOver, 250);
        }

        // Activates strict game rules, locks roles, starts clocks
        function startGame(fen, color) {
            $('#menu').hide();
            
            game.load(fen);
            board = Chessboard('board', { 
                draggable: true, 
                position: fen, 
                pieceTheme: '{piece}.png',
                onDragStart: onDragStart, 
                onDrop: onDrop 
            });
            
            if (color === 'black') {
                board.orientation('black');
            }

            updateClockDisplay();
            startClockTimer();
        }

        // Shared network data listener to capture updates
        function listenForData() {
            conn.on('data', data => {
                if (data.type === 'setup') {
                    // Sync the custom game length chosen by the host
                    whiteTime = data.gameDuration;
                    blackTime = data.gameDuration;
                    startGame(data.fen, 'black');
                } else if (data.type === 'move') {
                    game.move(data.moveObj);
                    board.position(game.fen());
                    
                    whiteTime = data.wTime;
                    blackTime = data.bTime;
                    updateClockDisplay();

                    setTimeout(checkGameOver, 250);
                }
            });
        }
